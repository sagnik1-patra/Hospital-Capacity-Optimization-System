project_name: CSA Based Smart Healthcare Resource Allocation and Hospital Capacity
  Optimization System
algorithm: Clonal Selection Algorithm
model_type: ANN, Random Forest, Decision Tree, CSA Optimization
features:
- Sanctioned Bed Strength (in Numbers) as on 01.01.2018
- Doctors_Required
- Nurses_Required
- ICU_Beds_Required
- Ambulances_Required
- Emergency_Staff_Required
- Equipment_Score
- CSA_Optimized_Doctors
- CSA_Optimized_Nurses
- CSA_Optimized_ICU_Beds
- CSA_Optimized_Ambulances
- CSA_Optimized_Emergency_Staff
target: Capacity_Category
classes:
- Large
- Medium
- Small
- Very Large
ann_accuracy: 1.0
random_forest_accuracy: 1.0
decision_tree_accuracy: 1.0
regression_r2: 0.33713450513737686
regression_mae: 0.7012165279165281
regression_rmse: 0.9231542769528402
